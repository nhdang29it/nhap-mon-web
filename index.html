<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Name Card</title>

<!-- thư viện icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:500px;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    padding:40px;
    text-align:center;
    transition:0.3s;
}

/* hiệu ứng hover */
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #4facfe;
    margin-bottom:20px;
}

h1{
    margin:10px 0;
    font-size:30px;
}

.job{
    color:#666;
    font-size:18px;
    margin-bottom:20px;
}

.info{
    font-size:16px;
    margin-bottom:20px;
}

.info p{
    margin:8px 0;
}

/* social icons */

.social{
    margin-top:20px;
}

.social a{
    text-decoration:none;
    color:white;
    margin:0 10px;
    font-size:22px;
    width:45px;
    height:45px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    transition:0.3s;
}

.facebook{ background:#1877f2; }
.github{ background:#333; }
.linkedin{ background:#0a66c2; }

.social a:hover{
    transform:scale(1.2);
}

</style>
</head>

<body>

<div class="card">

<img src="./bia.jpg" class="avatar">

<h1>Dang</h1>

<div class="job">Web Developer | AI Engineer</div>

<div class="info">
<p>📧 dang@example.com</p>
<p>📱 0123 456 789</p>
<p>📍 Vietnam</p>
</div>

<div class="social">

<a href="#" class="facebook">
<i class="fab fa-facebook-f"></i>
</a>

<a href="#" class="github">
<i class="fab fa-github"></i>
</a>

<a href="#" class="linkedin">
<i class="fab fa-linkedin-in"></i>
</a>

</div>

</div>

</body>
</html>
