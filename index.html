<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Name Card</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card{
        width: 450px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        padding: 35px;
        text-align: center;
    }

    .avatar{
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #ddd;
        margin: auto;
        margin-bottom: 15px;
    }

    h1{
        margin: 5px 0;
        font-size: 24px;
    }

    .job{
        color: #666;
        margin-bottom: 15px;
    }

    .info{
        text-align: left;
        margin-top: 10px;
    }

    .info p{
        margin: 6px 0;
        font-size: 14px;
    }

    .footer{
        margin-top: 15px;
        font-size: 13px;
        color: #888;
    }
</style>

</head>
<body>

<div class="card">

    <!-- <div class="avatar"></div> -->
    <img src="./bia.jpg" class="avatar">

    <h1>Dang</h1>
    <div class="job">Web Developer / AI Enthusiast</div>

    <div class="info">
        <p>📧 email: dang@example.com</p>
        <p>📱 phone: 0123 456 789</p>
        <p>🌐 website: yoursite.com</p>
    </div>

    <div class="footer">
        Nice to meet you!
    </div>

</div>

</body>
</html>
